<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Document</title>
	</head>
	<body>
		<script>
			const getTheTitles = (books) => {
				const container = [];

        for (const book of books) {
          container.push(book.title);
        }

        return container;
			};

        const books = [
      {
        title: 'Book',
        author: 'Name'
      },
      {
        title: 'Book2',
        author: 'Name2'
      }];

      console.log(getTheTitles(books));
		</script>
	</body>
</html>
